services:
  postgres:
    image: postgres:16
    container_name: dayflow-postgres
    environment:
      POSTGRESnn_USER: dayflow
      POSTGRES_PASSWORD: dayflow
      POSTGRES_DB: dayflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dayflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
